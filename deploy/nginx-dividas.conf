# Trecho a ser ADICIONADO dentro do server { ... } do site default da VM
# (arquivo: /etc/nginx/sites-enabled/zaz-tasklist, o `listen 80 default_server`).
#
# Cole este bloco dentro do server { }, por ex. logo depois do `location / { }`.
# A ORDEM não importa pro nginx, mas o modificador `^~` é OBRIGATÓRIO aqui:
# o site tem uma `location ~* \.(js|css|...)$` (regex) e, sem o `^~`, os assets
# do /dividas cairiam nessa regex (root errado) e dariam 404. O `^~` faz o
# nginx servir tudo de /dividas/ por este bloco, ignorando as regex.
#
# Depois:  sudo nginx -t && sudo systemctl reload nginx
# App estático (Vite) em http://10.100.12.23/dividas

  # /dividas sem barra → redireciona pra /dividas/
  location = /dividas {
    return 301 /dividas/;
  }

  # ^~ = se casar este prefixo, NÃO avalia as location regex do site
  location ^~ /dividas/ {
    root /var/www;                              # serve /var/www/dividas/...
    try_files $uri $uri/ /dividas/index.html;   # SPA: cai no index do app
  }
