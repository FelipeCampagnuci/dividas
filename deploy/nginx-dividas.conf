# Bloco a ser ADICIONADO dentro do server { ... } que já existe na VM
# (o mesmo que serve o meet-monitor na porta 80 / server_name de 10.100.12.23).
#
# Edite a config do site:  sudo nano /etc/nginx/sites-available/<seu-site>
# cole o location abaixo dentro do server { } e:
#   sudo nginx -t && sudo systemctl reload nginx
#
# App estático (Vite) em http://10.100.12.23/dividas

    # /dividas sem barra → manda pra /dividas/
    location = /dividas {
        return 301 /dividas/;
    }

    location /dividas/ {
        alias /var/www/dividas/;
        index index.html;
        # SPA client-side: rotas desconhecidas caem no index do app
        try_files $uri $uri/ /dividas/index.html;

        # assets com hash no nome podem ter cache longo
        location ~* ^/dividas/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
